openapi: 3.2.0
info:
  title: Objectified REST API
  description: REST API for the Objectified platform. CRUD scaffolding from database
    design. Services are used by the platform and can be exposed externally; internal
    use is via a private API key.
  version: 1.0.0
paths:
  /v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login — issue JWT
      description: 'Authenticate with email and password. Returns a signed JWT access
        token valid for 24 hours. Use the token as ``Authorization: Bearer <token>``
        on subsequent requests.'
      operationId: login_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes:
    get:
      tags:
      - Classes
      summary: List classes by version
      description: Return all classes for a version. Version-scoped. Pass include_deleted=true
        to include soft-deleted classes.
      operationId: list_classes_by_version_v1_versions__version_id__classes_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted classes
          default: false
          title: Include Deleted
        description: Include soft-deleted classes
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassSchema'
                title: Response List Classes By Version V1 Versions  Version Id  Classes
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Classes
      summary: Create class
      description: Create a new class in the given version.
      operationId: create_class_v1_versions__version_id__classes_post
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/with-properties-tags:
    get:
      tags:
      - Classes
      summary: List classes with properties and tags for version
      description: Return all classes for a version with their properties and tags
        embedded. Pass include_deleted=true to include soft-deleted classes.
      operationId: list_classes_with_properties_and_tags_v1_versions__version_id__classes_with_properties_tags_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted classes
          default: false
          title: Include Deleted
        description: Include soft-deleted classes
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
                title: Response List Classes With Properties And Tags V1 Versions  Version
                  Id  Classes With Properties Tags Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/{class_id}:
    get:
      tags:
      - Classes
      summary: Get class by ID
      description: Retrieve a class by ID within a version.
      operationId: get_class_v1_versions__version_id__classes__class_id__get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted class
          default: false
          title: Include Deleted
        description: Include soft-deleted class
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Classes
      summary: Update class
      description: Update class metadata and/or canvas_metadata (position, dimensions,
        style, group). Only provided fields are modified.
      operationId: update_class_v1_versions__version_id__classes__class_id__put
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Classes
      summary: Delete (soft-delete) class
      description: Soft-delete a class by setting deleted_at.
      operationId: delete_class_v1_versions__version_id__classes__class_id__delete
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/me:
    get:
      tags:
      - Users
      summary: Get current user profile
      description: 'Return the authenticated user''s account (requires JWT). Use ``Authorization:
        Bearer <token>`` with a token from ``/v1/auth/login``.'
      operationId: get_me_v1_me_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Users
      summary: Update current user profile
      description: Update the authenticated user's name and/or metadata (requires
        JWT). Only ``name`` and ``metadata`` can be updated; use admin endpoints for
        other fields.
      operationId: update_me_v1_me_patch
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users:
    get:
      tags:
      - Users
      summary: List users (admin)
      description: List all accounts. **Admin only** — requires a valid JWT with ``is_admin=true``,
        an account that is an administrator in at least one tenant, or a valid internal
        API key. Soft-deleted accounts are excluded by default; pass ``include_deleted=true``
        to include them.
      operationId: list_users_v1_users_get
      parameters:
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted accounts
          default: false
          title: Include Deleted
        description: Include soft-deleted accounts
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountSchema'
                title: Response List Users V1 Users Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Users
      summary: Create user (Sign Up)
      description: Register a new user account. Email must be unique.
      operationId: create_user_v1_users_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/users/{user_id}:
    get:
      tags:
      - Users
      summary: Get user by ID
      description: Retrieve a single account by its UUID.
      operationId: get_user_v1_users__user_id__get
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted account
          default: false
          title: Include Deleted
        description: Include soft-deleted account
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Users
      summary: Update user
      description: Update an existing user account. Only provided fields are updated.
      operationId: update_user_v1_users__user_id__put
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      summary: Deactivate user
      description: Soft-delete (deactivate) a user account by setting deleted_at.
        The record is retained; no hard delete is performed. **Admin only.**
      operationId: deactivate_user_v1_users__user_id__delete
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants:
    get:
      tags:
      - Tenants
      summary: List tenants
      description: List all tenants. Soft-deleted tenants are excluded by default.
      operationId: list_tenants_v1_tenants_get
      parameters:
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted tenants
          default: false
          title: Include Deleted
        description: Include soft-deleted tenants
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantSchema'
                title: Response List Tenants V1 Tenants Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Tenants
      summary: Create tenant
      description: Create a new tenant. Slug must be unique and URL-safe (lowercase
        alphanumeric with hyphens).
      operationId: create_tenant_v1_tenants_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}:
    get:
      tags:
      - Tenants
      summary: Get tenant by ID
      description: Retrieve a single tenant by its UUID. Soft-deleted tenants are
        excluded by default.
      operationId: get_tenant_v1_tenants__tenant_id__get
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted tenant
          default: false
          title: Include Deleted
        description: Include soft-deleted tenant
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Tenants
      summary: Update tenant
      description: Update an existing tenant. Only provided fields are updated. **Admin
        only.**
      operationId: update_tenant_v1_tenants__tenant_id__put
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Tenants
      summary: Deactivate tenant
      description: Soft-delete (deactivate) a tenant by setting deleted_at. The record
        is retained; no hard delete is performed. **Admin only.**
      operationId: deactivate_tenant_v1_tenants__tenant_id__delete
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}/members:
    get:
      tags:
      - Tenants
      summary: List tenant members
      description: List all active members (tenant_account rows) for a tenant.
      operationId: list_tenant_members_v1_tenants__tenant_id__members_get
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantAccountSchema'
                title: Response List Tenant Members V1 Tenants  Tenant Id  Members
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Tenants
      summary: Add tenant member
      description: Add an account to a tenant with a given access level. The account
        can be identified by ``account_id`` (UUID) or ``email``. If both are provided,
        ``account_id`` takes precedence.
      operationId: add_tenant_member_v1_tenants__tenant_id__members_post
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantAccountCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantAccountSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}/members/{account_id}:
    delete:
      tags:
      - Tenants
      summary: Remove tenant member
      description: Remove (soft-delete) an account from a tenant. **Admin only.**
      operationId: remove_tenant_member_v1_tenants__tenant_id__members__account_id__delete
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Tenants
      summary: Update tenant member
      description: Update the access level or enabled status of a tenant member. **Admin
        only.**
      operationId: update_tenant_member_v1_tenants__tenant_id__members__account_id__put
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantAccountUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantAccountSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_id}/administrators:
    get:
      tags:
      - Tenants
      summary: List tenant administrators
      description: List all active members with access_level=administrator for a tenant.
      operationId: list_tenant_administrators_v1_tenants__tenant_id__administrators_get
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
