openapi: 3.2.0
info:
  title: Objectified REST API
  description: REST API for the Objectified platform. CRUD scaffolding from database
    design. Services are used by the platform and can be exposed externally; internal
    use is via a private API key.
  version: 1.0.13
paths:
  /v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login — issue JWT
      description: 'Authenticate with email and password. Returns a signed JWT access
        token valid for 24 hours. Use the token as ``Authorization: Bearer <token>``
        on subsequent requests.'
      operationId: login_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/{class_id}/properties:
    get:
      tags:
      - Class Properties
      summary: List properties for a class
      description: Return all properties assigned to a class. Pass ``parent_id`` query
        param to filter by parent (for nested properties). Omit ``parent_id`` to return
        all (both top-level and nested). Properties whose underlying library property
        has been deleted are excluded.
      operationId: list_class_properties_v1_versions__version_id__classes__class_id__properties_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: parent_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by parent property ID
          title: Parent Id
        description: Filter by parent property ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassPropertySchema'
                title: Response List Class Properties V1 Versions  Version Id  Classes  Class
                  Id  Properties Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Class Properties
      summary: Add property to class
      description: Add a library property to a class, optionally overriding its name,
        description, and/or data. Supply ``parent_id`` to nest the property under
        another class property.
      operationId: add_property_to_class_v1_versions__version_id__classes__class_id__properties_post
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassPropertyCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassPropertySchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/{class_id}/properties/{class_property_id}:
    put:
      tags:
      - Class Properties
      summary: Update class property join row
      description: 'Update the overrides stored on the class_property join row: name,
        description, data (JSON Schema), and/or parent_id for re-nesting. Only provided
        fields are modified.'
      operationId: update_class_property_v1_versions__version_id__classes__class_id__properties__class_property_id__put
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: class_property_id
        in: path
        required: true
        schema:
          type: string
          title: Class Property Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassPropertyUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassPropertySchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Class Properties
      summary: Remove property from class
      description: Remove a property from a class by deleting the class_property join
        row. Child properties whose parent_id references the deleted row will have
        their parent_id set to NULL (promoted to top-level) via the ON DELETE SET
        NULL foreign key constraint.
      operationId: remove_property_from_class_v1_versions__version_id__classes__class_id__properties__class_property_id__delete
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: class_property_id
        in: path
        required: true
        schema:
          type: string
          title: Class Property Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes:
    get:
      tags:
      - Classes
      summary: List classes by version
      description: Return all classes for a version. Version-scoped. Pass include_deleted=true
        to include soft-deleted classes.
      operationId: list_classes_by_version_v1_versions__version_id__classes_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted classes
          default: false
          title: Include Deleted
        description: Include soft-deleted classes
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassSchema'
                title: Response List Classes By Version V1 Versions  Version Id  Classes
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Classes
      summary: Create class
      description: Create a new class in the given version.
      operationId: create_class_v1_versions__version_id__classes_post
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/with-properties-tags:
    get:
      tags:
      - Classes
      summary: List classes with properties and tags for version
      description: 'Bulk endpoint for canvas load: return all classes for a version
        with their properties and tags (from metadata) in one response. Pass include_deleted=true
        to include soft-deleted classes.'
      operationId: list_classes_with_properties_and_tags_v1_versions__version_id__classes_with_properties_tags_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted classes
          default: false
          title: Include Deleted
        description: Include soft-deleted classes
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassWithPropertiesAndTags'
                title: Response List Classes With Properties And Tags V1 Versions  Version
                  Id  Classes With Properties Tags Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/{class_id}/with-properties-tags:
    get:
      tags:
      - Classes
      summary: Get class with properties and tags
      description: Return a single class with its properties and tags (from metadata).
        Useful for loading a single class detail view.
      operationId: get_class_with_properties_and_tags_v1_versions__version_id__classes__class_id__with_properties_tags_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted class
          default: false
          title: Include Deleted
        description: Include soft-deleted class
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassWithPropertiesAndTags'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/{class_id}/tags:
    get:
      tags:
      - Classes
      summary: Get tags for class
      description: 'Return tag names assigned to the class (GitHub #103).'
      operationId: get_tags_for_class_v1_versions__version_id__classes__class_id__tags_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted class
          default: false
          title: Include Deleted
        description: Include soft-deleted class
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassTagsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Classes
      summary: Assign tag to class
      description: 'Add a tag to the class''s metadata.tags (GitHub #103). Idempotent
        if already present.'
      operationId: assign_tag_to_class_v1_versions__version_id__classes__class_id__tags_post
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassAssignTagRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassTagsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/{class_id}/tags/{tag_name}:
    delete:
      tags:
      - Classes
      summary: Remove tag from class
      description: 'Remove a tag from the class''s metadata.tags (GitHub #103).'
      operationId: remove_tag_from_class_v1_versions__version_id__classes__class_id__tags__tag_name__delete
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: tag_name
        in: path
        required: true
        schema:
          type: string
          title: Tag Name
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassTagsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/classes/{class_id}:
    get:
      tags:
      - Classes
      summary: Get class by ID
      description: Retrieve a class by ID within a version.
      operationId: get_class_v1_versions__version_id__classes__class_id__get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: include_deleted
        in: query
        required: false
        schema:
          type: boolean
          description: Include soft-deleted class
          default: false
          title: Include Deleted
        description: Include soft-deleted class
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Classes
      summary: Update class
      description: Update class metadata and/or canvas_metadata (position, dimensions,
        style, group). Only provided fields are modified.
      operationId: update_class_v1_versions__version_id__classes__class_id__put
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Classes
      summary: Delete (soft-delete) class
      description: Soft-delete a class by setting deleted_at.
      operationId: delete_class_v1_versions__version_id__classes__class_id__delete
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: path
        required: true
        schema:
          type: string
          title: Class Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/export/openapi:
    get:
      tags:
      - Export
      summary: Export version as OpenAPI 3.2.0
      description: Generate and export an OpenAPI 3.2.0 specification document for
        the given version. All active classes in the version are exported as components/schemas
        entries. The response is a JSON document conforming to the OpenAPI 3.2.0 specification.
      operationId: export_openapi_v1_versions__version_id__export_openapi_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: project_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Override the API title (info.title).
          title: Project Name
        description: Override the API title (info.title).
      - name: version
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Override the API version string (info.version).
          title: Version
        description: Override the API version string (info.version).
      - name: description
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Override the API description (info.description).
          title: Description
        description: Override the API description (info.description).
      - name: servers
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JSON-encoded array of server objects, e.g. [{"url":"https://api.example.com","description":"Production"}].
          title: Servers
        description: JSON-encoded array of server objects, e.g. [{"url":"https://api.example.com","description":"Production"}].
      - name: tags
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JSON-encoded array of tag objects, e.g. [{"name":"Users","description":"User
            operations"}].
          title: Tags
        description: JSON-encoded array of tag objects, e.g. [{"name":"Users","description":"User
          operations"}].
      - name: security
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JSON-encoded array of security requirement objects, e.g. [{"Bearer":[]}].
          title: Security
        description: JSON-encoded array of security requirement objects, e.g. [{"Bearer":[]}].
      - name: external_docs
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: JSON-encoded external documentation object, e.g. {"url":"https://docs.example.com","description":"API
            documentation"}.
          title: External Docs
        description: JSON-encoded external documentation object, e.g. {"url":"https://docs.example.com","description":"API
          documentation"}.
      - name: metadata
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'JSON-encoded metadata object with optional keys: summary,
            terms_of_service, contact ({name, url, email}), license ({name, identifier,
            url}).'
          title: Metadata
        description: 'JSON-encoded metadata object with optional keys: summary, terms_of_service,
          contact ({name, url, email}), license ({name, identifier, url}).'
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: OpenAPI 3.2.0 specification document
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid JSON in query parameter
        '404':
          description: Version not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/versions/{version_id}/export/jsonschema:
    get:
      tags:
      - Export
      summary: Export version as JSON Schema 2020-12
      description: Generate and export a JSON Schema 2020-12 document for the given
        version. By default all active classes are exported as $defs entries in a
        single multi-schema document. Pass class_id to export only a single class
        as a standalone JSON Schema document.
      operationId: export_jsonschema_v1_versions__version_id__export_jsonschema_get
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: class_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional class UUID. When provided, export only this class
            as a standalone JSON Schema document instead of the full multi-schema
            document.
          title: Class Id
