  /v1/versions/{version_id}/merge:
    post:
      tags:
      - Version Commits
      summary: Merge another version into this version
      description: 'Merge classes and properties from a source version into the current
        version. Two merge strategies are supported:


        - **additive**: Keep local classes and properties, only add remote-only items.

        - **override**: Remote wins for metadata fields; property constraints are
        merged using stricter-wins semantics (e.g. larger minLength, smaller maxLength,
        enum union).


        Both versions must belong to the same project. Conflicts are reported in the
        response but do not block the merge. A new snapshot is created after merging.'
      operationId: merge_version_v1_versions__version_id__merge_post
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
          type: string
          title: Version Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionMergeRequest'
      responses:
        '200':
          description: Merge result with optional conflicts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionMergeResponse'
        '400':
          description: Versions belong to different projects
        '404':
          description: Version or source version not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
