  /v1/versions/{version_id}/freeze-schema:
    post:
      tags:
      - Versions
      summary: Freeze (capture) a version schema snapshot
      description: Capture and freeze the current state of all classes and properties
        for a version as an immutable snapshot. This is a one-time operation per version
        — if a snapshot already exists, use the /snapshots endpoint to commit additional
        revisions. Freezing a schema requires user authentication (JWT token).
      operationId: freeze_version_schema_v1_versions__version_id__freeze_schema_post
      parameters:
      - name: version_id
        in: path
        required: true
        schema:
