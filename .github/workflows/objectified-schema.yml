# Build objectified-schema using schema-evolution-manager (sem-apply).
# Runs on any branch when files under objectified-schema/ change.
# Uses PostgreSQL 18 + pgvector and Python 3.12.

name: Objectified Database Schema

on:
  push:
    paths:
      - 'objectified-schema/**'
  pull_request:
    paths:
      - 'objectified-schema/**'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg18-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: objectified
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PostgreSQL client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-18

      - name: Wait for PostgreSQL
        env:
          PGPASSWORD: postgres
        run: |
          for i in $(seq 1 30); do
            if psql -h localhost -p 5432 -U postgres -d postgres -c '\q' 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          psql -h localhost -p 5432 -U postgres -d postgres -c '\q'

      - name: Create application and test databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5432 -U postgres -d postgres -c "SELECT 1 FROM pg_database WHERE datname = 'objectified'" | grep -q 1 || createdb -h localhost -p 5432 -U postgres objectified
          psql -h localhost -p 5432 -U postgres -d postgres -c "SELECT 1 FROM pg_database WHERE datname = 'objectified_test'" | grep -q 1 || createdb -h localhost -p 5432 -U postgres objectified_test

      - name: Set environment for sem-apply and tests
        run: |
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_USERNAME=postgres" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=postgres" >> $GITHUB_ENV
          echo "POSTGRES_TEST_DB=objectified_test" >> $GITHUB_ENV

      - name: Install schema-evolution-manager
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby ruby-dev build-essential
          gem install schema-evolution-manager
          which sem-apply

      - name: Apply schema with sem-apply
        working-directory: objectified-schema
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: postgres
        run: |
          sem-apply --url "postgresql://postgres:postgres@localhost:5432/objectified"

      - name: Install Python dependencies
        working-directory: objectified-schema
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: objectified-schema
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_TEST_DB: objectified_test
        run: |
          make test
